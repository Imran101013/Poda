<script>
(function(){
  var STUDIES = {
    'women-farmers-protection-study': {
      breadcrumb: 'Women Farmers Protection Study',
      eyebrow: 'Research Report · 2022',
      title: 'Protection Issues Faced by Women Farmers in Pakistan to Develop Strategic Solutions',
      funder: 'Food and Agriculture Organization of the United Nations (FAO)',
      location: 'All over Pakistan',
      date: 'Nov 2021 – Mar 2022',
      image: 'images/programs/prog2-women.jpeg',
      imageAlt: 'Protection Issues Faced by Women Farmers in Pakistan',
      abstract: 'This study collected data and identified gaps in the protection of women farmers from violence and harassment in the workplace during agricultural work — spanning major crops, fisheries, and livestock across Pakistan. It was conducted to inform PODA and FAO\'s strategic response to protection risks facing women in the agricultural workforce.',
      methodology: 'Data collection combined field surveys and consultations with women farmers, agricultural laborers and community stakeholders across multiple provinces, focused on identifying health hazards, safety gaps, and barriers to justice and grievance redressal in agricultural workplaces.',
      findings: [
        'Women farmers face elevated exposure to health hazards and lack of social safety nets compared to their male counterparts.',
        'Gender-based violence and harassment remain under-reported due to limited access to grievance redressal mechanisms.',
        'Denial of access to the justice system is a recurring barrier across major crops, fisheries, and livestock sectors.',
        'Findings directly informed PODA\'s Stop Violence Against Women program and follow-on advocacy for workplace protections.'
      ],
      citation: 'PODA Pakistan &amp; Food and Agriculture Organization of the United Nations (2022). Protection Issues Faced by Women Farmers in Pakistan to Develop Strategic Solutions.'
    },
    'climate-resilient-wash-policy-assessment': {
      breadcrumb: 'Climate-Resilient WASH Policy Assessment',
      eyebrow: 'Policy Assessment · 2025',
      title: 'Gender-Responsive, Inclusive, and Climate-Resilient WASH: A Policy Assessment',
      funder: 'WaterAid',
      location: 'Karachi, Lahore, Islamabad',
      date: 'Jan – Mar 2025',
      image: 'images/site/prog-climate.jpeg',
      imageAlt: 'Climate-Resilient WASH Policy Assessment',
      abstract: 'This assessment examined how water, sanitation and hygiene (WASH) policy in Pakistan accounts for gender responsiveness, disability inclusion, and climate resilience, through consultation meetings held across three major cities.',
      methodology: 'Consultation meetings were convened in Karachi, Lahore and Islamabad with WASH sector stakeholders, policymakers and women\'s leadership representatives to assess current policy gaps and promote women\'s leadership in WASH governance.',
      findings: [
        'WASH policy frameworks in the consulted cities showed limited integration of climate-resilience planning.',
        'Women\'s leadership in WASH governance structures remains limited relative to their role in household water management.',
        'Consultation participants identified concrete entry points for gender-responsive WASH policy reform.',
        'Findings feed directly into PODA\'s Climate Action program and ongoing WASH policy advocacy.'
      ],
      citation: 'PODA Pakistan &amp; WaterAid (2025). Gender-Responsive, Inclusive, and Climate-Resilient WASH: A Policy Assessment.'
    },
    'gbvh-workplace-participatory-research': {
      breadcrumb: 'GBVH in the Workplace: Participatory Research',
      eyebrow: 'Participatory Research · 2026 · Ongoing',
      title: 'Gender-Based Violence and Harassment in the Workplace: A Participatory Research Study',
      funder: 'European Union (EU), Beyond Barriers Project',
      location: 'Punjab &amp; Khyber Pakhtunkhwa (Peshawar, Mardan, Chakwal, Multan)',
      date: 'April 2026 – Ongoing',
      image: 'images/site/prog-policy.jpg',
      imageAlt: 'Gender-Based Violence and Harassment in the Workplace Research',
      abstract: 'Conducted under the Beyond Barriers project, this participatory research study examines Gender-Based Violence and Harassment (GBVH) in workplaces, with a specific focus on the experiences of women with disabilities and women-led organizations across Punjab and Khyber Pakhtunkhwa.',
      methodology: 'Participatory research methods directly engage women with and without disabilities, employers, and Business Development Service providers, feeding into disability-inclusive referral pathways and evidence-based advocacy for safer workplaces.',
      findings: [
        'Research is developing disability-inclusive referral pathways for GBVH survivors in workplace settings.',
        'Early consultations point to compounded barriers facing women with disabilities reporting workplace harassment.',
        'Findings will inform policy dialogue on the Protection Against Harassment of Women at the Workplace Act 2022.',
        'This is an ongoing study — final findings will be published as the Beyond Barriers project progresses through 2026–2029.'
      ],
      citation: 'PODA Pakistan, Sightsavers &amp; European Union (2026, ongoing). Gender-Based Violence and Harassment in the Workplace: A Participatory Research Study.'
    }
  };

  var slug = new URLSearchParams(window.location.search).get('study') || 'women-farmers-protection-study';
  var study = STUDIES[slug] || STUDIES['women-farmers-protection-study'];

  document.getElementById('study-breadcrumb').textContent = study.breadcrumb;
  document.getElementById('study-eyebrow').textContent = study.eyebrow;
  document.getElementById('study-title').innerHTML = study.title;
  document.getElementById('study-meta').innerHTML =
    '<span><svg class="icon"><use href="#i-bank"/></svg>' + study.funder + '</span>' +
    '<span><svg class="icon"><use href="#i-pin"/></svg>' + study.location + '</span>' +
    '<span><svg class="icon"><use href="#i-calendar"/></svg>' + study.date + '</span>';
  document.title = study.breadcrumb + ' — PODA Pakistan';

  var img = document.getElementById('study-image');
  img.src = study.image; img.alt = study.imageAlt;

  document.getElementById('study-abstract').textContent = study.abstract;
  document.getElementById('study-methodology').textContent = study.methodology;
  document.getElementById('study-findings').innerHTML = study.findings.map(function(f){
    return '<li><span class="ic"><svg><use href="#i-check"/></svg></span>' + f + '</li>';
  }).join('');
  document.getElementById('study-citation').innerHTML = study.citation;
})();
</script>
