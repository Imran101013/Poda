<!-- LIGHTBOX OVERLAY -->
<div id="lb-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;align-items:center;justify-content:center;flex-direction:column;">
  <button id="lb-close" style="position:absolute;top:20px;right:28px;background:none;border:none;color:#fff;font-size:36px;cursor:pointer;line-height:1;">&#x2715;</button>
  <button id="lb-prev" style="position:absolute;left:20px;background:none;border:none;color:#fff;font-size:40px;cursor:pointer;">&#8249;</button>
  <button id="lb-next" style="position:absolute;right:20px;background:none;border:none;color:#fff;font-size:40px;cursor:pointer;">&#8250;</button>
  <img id="lb-img" src="" alt="" style="max-width:90vw;max-height:85vh;border-radius:6px;object-fit:contain;">
  <p id="lb-caption" style="color:#ddd;margin-top:12px;font-size:14px;"></p>
</div>

<style>
.conf-tab-nav{display:flex;gap:0;border-bottom:2px solid #e5e5e5;margin-bottom:32px;flex-wrap:wrap;}
.conf-tab-btn{padding:12px 24px;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;font-size:15px;font-weight:600;cursor:pointer;color:#666;transition:color .2s,border-color .2s;}
.conf-tab-btn.active,.conf-tab-btn:hover{color:#55357E;border-bottom-color:#55357E;}
.conf-tab-panel{display:none;}
.conf-tab-panel.active{display:block;}
.conf-tab-panel h3{font-size:20px;margin-bottom:16px;color:#1a1a1a;}
.conf-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:24px;}
.lb-thumb{display:block;overflow:hidden;border-radius:6px;aspect-ratio:1;cursor:zoom-in;}
.lb-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .25s;}
.lb-thumb:hover img{transform:scale(1.06);}
</style>

<script>
(function(){
  var CONFERENCES = {
    '2025': {
      breadcrumb: 'Conference 2025 Detail',
      eyebrow: '18th Edition · October 2025',
      title: '18th Annual Rural Women Leadership Training Conference',
      meta: '<span><svg class="icon"><use href="#i-calendar"/></svg>15–17 October 2025</span><span><svg class="icon"><use href="#i-pin"/></svg>Islamabad</span><span><svg class="icon"><use href="#i-people"/></svg>1,500+ Leaders · 100 Districts</span>',
      image: 'images/site/prog-conference.png',
      imageAlt: '18th Annual Rural Women Leadership Training Conference 2025',
      overview: 'PODA\'s 18th Annual Rural Women Leadership Training Conference ran from 15–17 October 2025 in Islamabad, bringing together over 1,500 rural women leaders from 100 districts across Pakistan. The gathering commemorated International Day of Rural Women, World Food Day, and World Day for Poverty Eradication.',
      days: [
        { label:'Day 1', id:'day1', heading:'Day 1 · 15 October 2025 — Opening &amp; Keynotes', body:'<p>The conference opened with a formal inauguration ceremony attended by rural women leaders, government officials, and civil society representatives. Keynote addresses focused on the theme of constitutional rights and legal identity as the foundation of rural women\'s empowerment.</p><p><strong>Key Sessions:</strong> Inaugural address by PODA President Sameena Nazir · Keynote by constitutional rights expert Zafarullah Khan on legal identity and citizenship · Panel on CNIC enrollment and birth registration barriers for rural women.</p>', gallery:[{src:'images/site/prog-conference.png',alt:'Day 1 – Opening Ceremony'},{src:'images/site/hero-2.jpg',alt:'Day 1 – Keynote Session'},{src:'images/site/hero-3.jpg',alt:'Day 1 – Panel Discussion'},{src:'images/site/hero-4.jpg',alt:'Day 1 – Participants'},{src:'images/programs/prog2-conference.jpg',alt:'Day 1 – Group Photo'},{src:'images/site/prog-activity.jpg',alt:'Day 1 – Activity'}] },
        { label:'Day 2', id:'day2', heading:'Day 2 · 16 October 2025 — Policy Sessions', body:'<p>The second day was dedicated to in-depth policy sessions across four thematic areas, with working groups producing draft recommendations that would feed into the final resolution. Women leaders from all 100 districts participated in structured dialogue with policymakers.</p><p><strong>Key Sessions:</strong> Working group on Education &amp; Economic Empowerment · Session on Climate Justice and Disaster Preparedness · Digital literacy and AI skills training demonstration · Agriculture committee representation workshop.</p>', gallery:[{src:'images/site/prog-policy.jpg',alt:'Day 2 – Policy Session'},{src:'images/site/hero-2.jpg',alt:'Day 2 – Working Groups'},{src:'images/site/hero-3.jpg',alt:'Day 2 – Climate Session'},{src:'images/programs/prog2-conference.jpg',alt:'Day 2 – Participants'},{src:'images/site/prog-conference.png',alt:'Day 2 – Workshop'},{src:'images/site/hero-4.jpg',alt:'Day 2 – Discussion'}] },
        { label:'Day 3', id:'day3', heading:'Day 3 · 17 October 2025 — Resolution &amp; Closing', body:'<p>The final day saw the adoption of the 18-point resolution, covering legal identity, education, climate response, and governance. The closing ceremony celebrated the contributions of all 1,500+ participants and outlined next steps for carrying the resolutions into policy.</p><p><strong>Resolution Highlights:</strong> Legal Identity &amp; Protection — CNIC enrollment, minimum marriage age 18 · Education &amp; Economic Empowerment — rural girls\' schools, women as Farmers · Disaster &amp; Climate Response — women in disaster bodies · Workplace &amp; Governance — 50% local government seats for women.</p>', gallery:[{src:'images/programs/prog2-conference.jpg',alt:'Day 3 – Resolution Adoption'},{src:'images/site/prog-conference.png',alt:'Day 3 – Closing Ceremony'},{src:'images/site/hero-2.jpg',alt:'Day 3 – Group Photo'},{src:'images/site/hero-3.jpg',alt:'Day 3 – Award Ceremony'},{src:'images/site/hero-4.jpg',alt:'Day 3 – Participants'},{src:'images/site/prog-activity.jpg',alt:'Day 3 – Final Session'}] }
      ],
      downloads: [
        { label:'&#8659; 2025 Resolution', href:'#' },
        { label:'&#8659; 2025 Booklet', href:'activities/constitutional-rights-equal-voices.html' }
      ]
    },
    '2024': {
      breadcrumb: 'Conference 2024 Detail',
      eyebrow: '17th Edition · 2024',
      title: '17th Annual Rural Women Leadership Training Conference',
      meta: '<span><svg class="icon"><use href="#i-calendar"/></svg>2024</span><span><svg class="icon"><use href="#i-pin"/></svg>Islamabad</span>',
      image: 'images/programs/prog2-conference.jpg',
      imageAlt: '17th Annual Conference 2024',
      overview: 'PODA\'s 17th Annual Rural Women Leadership Training Conference brought together rural women leaders from across Pakistan to discuss rights, governance, and empowerment.',
      days: [],
      downloads: []
    },
    '2020': {
      breadcrumb: 'Conference 2020–2021 Detail',
      eyebrow: '16th Edition · 2020–2021',
      title: '16th Annual Rural Women Leadership Training Conference',
      meta: '<span><svg class="icon"><use href="#i-calendar"/></svg>2020–2021</span><span><svg class="icon"><use href="#i-pin"/></svg>Pakistan</span>',
      image: 'images/programs/prog2-conference.jpg',
      imageAlt: '16th Annual Conference 2020–2021',
      overview: 'PODA\'s 16th Annual Rural Women Leadership Training Conference addressed challenges faced by rural women during the pandemic period, focusing on resilience and rights.',
      days: [],
      downloads: []
    },
    '2019': {
      breadcrumb: 'Conference 2019–2020 Detail',
      eyebrow: '15th Edition · 2019–2020',
      title: '15th Annual Rural Women Leadership Training Conference',
      meta: '<span><svg class="icon"><use href="#i-calendar"/></svg>2019–2020</span><span><svg class="icon"><use href="#i-pin"/></svg>Pakistan</span>',
      image: 'images/programs/prog2-conference.jpg',
      imageAlt: '15th Annual Conference 2019–2020',
      overview: 'PODA\'s 15th Annual Rural Women Leadership Training Conference convened rural women leaders to advance advocacy on land rights, education, and political participation.',
      days: [],
      downloads: []
    },
    '2011': {
      breadcrumb: 'Conference 2011 Detail',
      eyebrow: 'Early Edition · 2011',
      title: 'Annual Rural Women Leadership Training Conference 2011',
      meta: '<span><svg class="icon"><use href="#i-calendar"/></svg>2011</span><span><svg class="icon"><use href="#i-pin"/></svg>Pakistan</span>',
      image: 'images/programs/prog2-conference.jpg',
      imageAlt: 'Annual Conference 2011',
      overview: 'One of PODA\'s early Annual Rural Women Leadership Training Conferences, laying the groundwork for the national network of rural women leaders that continues to grow today.',
      days: [],
      downloads: []
    }
  };

  var edition = new URLSearchParams(window.location.search).get('edition') || '2025';
  var conf = CONFERENCES[edition] || CONFERENCES['2025'];

  // Populate header
  document.getElementById('conf-breadcrumb').textContent = conf.breadcrumb;
  document.getElementById('conf-eyebrow').textContent = conf.eyebrow;
  document.getElementById('conf-title').textContent = conf.title;
  document.getElementById('conf-meta').innerHTML = conf.meta;
  document.title = conf.title + ' — PODA Pakistan';

  // Build body
  function galleryHtml(imgs, dayId) {
    if (!imgs || !imgs.length) return '';
    return '<div class="conf-gallery">' + imgs.map(function(g){
      return '<a href="'+g.src+'" class="lb-thumb" data-group="'+dayId+'"><img src="'+g.src+'" alt="'+g.alt+'"></a>';
    }).join('') + '</div>';
  }

  var bodyHtml = '<div class="reveal" style="margin-bottom:40px;"><div class="post-media"><img src="'+conf.image+'" alt="'+conf.imageAlt+'"></div><p style="margin-top:24px;">'+conf.overview+'</p></div>';

  if (conf.days && conf.days.length) {
    var tabNav = conf.days.map(function(d,i){
      return '<button class="conf-tab-btn'+(i===0?' active':''+'"')+' data-tab="'+d.id+'">'+d.label+'</button>';
    }).join('');
    var tabPanels = conf.days.map(function(d,i){
      return '<div class="conf-tab-panel'+(i===0?' active':''+'"')+' id="'+d.id+'"><h3>'+d.heading+'</h3>'+d.body+galleryHtml(d.gallery,d.id)+'</div>';
    }).join('');
    bodyHtml += '<div class="conf-tabs reveal"><div class="conf-tab-nav">'+tabNav+'</div>'+tabPanels+'</div>';
  }

  document.getElementById('conf-body').innerHTML = bodyHtml;

  // Downloads
  var dlEl = document.getElementById('conf-downloads');
  if (conf.downloads && conf.downloads.length) {
    dlEl.innerHTML = conf.downloads.map(function(d){
      return '<a class="btn btn-primary" href="'+d.href+'"><svg class="icon"><use href="#i-download"/></svg>'+d.label+'</a>';
    }).join('');
  } else {
    dlEl.style.display = 'none';
  }

  // Tabs
  document.addEventListener('click', function(e){
    var btn = e.target.closest('.conf-tab-btn');
    if (!btn) return;
    document.querySelectorAll('.conf-tab-btn').forEach(function(b){b.classList.remove('active');});
    document.querySelectorAll('.conf-tab-panel').forEach(function(p){p.classList.remove('active');});
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });

  // Lightbox
  var overlay=document.getElementById('lb-overlay');
  var lbImg=document.getElementById('lb-img');
  var lbCap=document.getElementById('lb-caption');
  var items=[],cur=0;
  function showLb(){lbImg.src=items[cur].href;lbImg.alt=items[cur].querySelector('img').alt;lbCap.textContent=items[cur].querySelector('img').alt;}
  document.addEventListener('click',function(e){
    var thumb=e.target.closest('.lb-thumb');
    if(!thumb)return;
    e.preventDefault();
    var group=thumb.dataset.group;
    items=Array.from(document.querySelectorAll('.lb-thumb[data-group="'+group+'"]'));
    cur=items.indexOf(thumb);
    showLb();
    overlay.style.display='flex';
  });
  document.getElementById('lb-close').addEventListener('click',function(){overlay.style.display='none';});
  document.getElementById('lb-prev').addEventListener('click',function(){cur=(cur-1+items.length)%items.length;showLb();});
  document.getElementById('lb-next').addEventListener('click',function(){cur=(cur+1)%items.length;showLb();});
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.style.display='none';});
  document.addEventListener('keydown',function(e){
    if(overlay.style.display==='flex'){
      if(e.key==='ArrowRight'){cur=(cur+1)%items.length;showLb();}
      if(e.key==='ArrowLeft'){cur=(cur-1+items.length)%items.length;showLb();}
      if(e.key==='Escape')overlay.style.display='none';
    }
  });
})();
</script>
