<script>
(function(){
  var POSTS = {
    'reflections-18th-annual-conference': {
      category: 'Field Notes',
      title: 'Reflections from the 18th Annual Rural Women Leadership Conference',
      author: 'PODA Communications Team',
      date: '10 November 2025',
      image: 'images/site/prog-conference.png',
      imageAlt: '18th Annual Rural Women Leadership Training Conference',
      body: [
        'Fifteen years ago, PODA convened its first Annual Rural Women Leadership Training Conference with a handful of districts represented in the room. This October, the 18th edition brought together more than 1,500 rural women leaders from 100 districts across Pakistan to Islamabad — a scale that would have been hard to imagine at the start.',
        'Over three days, the conversation moved from legal identity and CNIC registration to climate resilience, digital safety, and women\'s representation in local government. What struck our team most wasn\'t the size of the crowd, but how specific the questions were: not "how do we get more women involved," but "how do we get the district election commission to actually process our registration forms."',
        'The conference closed with an 18-point resolution touching legal identity, education, climate response and governance — the same resolution now guiding PODA\'s advocacy priorities for the year ahead. Planning for the 19th edition is already underway.'
      ]
    },
    'legal-identity-first-step': {
      category: 'Policy &amp; Advocacy',
      title: 'Why Legal Identity Is the First Step to Empowerment',
      author: 'Sameena Nazir, Executive Director',
      date: '2 September 2025',
      image: 'images/site/prog-democracy.jpeg',
      imageAlt: 'Mobile legal aid clinic',
      body: [
        'A woman without a CNIC cannot vote, cannot open a bank account, cannot inherit property, and often cannot access healthcare that requires identification. For fifteen-plus years, PODA\'s mobile legal aid clinics and civil-registration drives have started from this simple observation: legal identity is not paperwork, it is the precondition for almost everything else rural women are trying to build.',
        'We have watched the same pattern repeat across dozens of districts — women who had never been able to open a bank account or register a business, blocked not by lack of ambition but by a missing government form. Our mobile legal aid clinics, including a recent three-day clinic in Islamabad\'s France Colony, exist to close exactly that gap: on-the-spot documentation support, legal counseling, and referrals, delivered where people already are instead of asking them to travel to us.',
        'It is unglamorous work compared to a leadership conference or a policy win, but it is the work that makes the rest possible. You cannot advocate for inheritance rights on behalf of a woman who, on paper, does not officially exist.'
      ]
    },
    'decade-organic-farming-nara-mughlan': {
      category: 'Field Notes',
      title: 'A Decade of Organic Farming at Nara Mughlan: What We\'ve Learned',
      author: 'PODA Sustainable Agriculture Team',
      date: '14 July 2025',
      image: 'images/site/prog-climate.jpeg',
      imageAlt: 'Nara Mughlan demonstration farm',
      body: [
        'PODA\'s demonstration farm at Nara Mughlan, Chakwal, was established in 2010 with a simple premise: rural youth learn climate-resilient agriculture best by doing it, season after season, on a real working farm rather than in a classroom.',
        'Over the past decade the farm has expanded from basic organic kitchen gardening into vegetable tunnel farming, wheat seed banking, and — more recently — real-time weather advisory using IoT weather stations and soil moisture meters. Training now covers everything from seasonal sowing and harvesting to the green job skills that translate directly into local livelihoods.',
        'The lesson that took us longest to learn: technology adoption follows trust, not the other way around. The weather stations only became useful to farmers once they had spent a season watching the demonstration plots outperform expectations using the same data. Now it\'s a routine part of how the farm — and increasingly, the surrounding community — plans its planting calendar.'
      ]
    },
    'ending-child-marriage-punjab-ordinance': {
      category: 'Policy &amp; Advocacy',
      title: 'Ending Child Marriage: How the Punjab Ordinance Came Together',
      author: 'PODA Policy &amp; Advocacy Team',
      date: '20 February 2026',
      image: 'images/site/prog-women.jpg',
      imageAlt: 'Legal literacy session on child marriage prevention',
      body: [
        'The Punjab Child Marriage Restraint Ordinance, which sets 18 as the minimum legal age of marriage for girls across the province, didn\'t happen in a single legislative session. It followed a three-year, 41-district campaign — Reduce Early Marriages to Enhance Gender Equality, backed by the Royal Norwegian Embassy — built on legal-literacy sessions, conflict-resolution workshops and community outreach conducted village by village.',
        'PODA\'s role was less about drafting legal text and more about building the evidence and the constituency for it: documenting the health and social costs of early marriage, training community-resource persons, and organizing rural women farmers and legal-literacy participants around a shared demand.',
        'The ordinance is a milestone, not an endpoint. Enforcement depends on the same community-level awareness work that built the case for it in the first place — which is why the legal-literacy sessions continue in the districts where the campaign began.'
      ]
    },
    'voices-from-parwl': {
      category: 'Community Voices',
      title: 'Voices from PARWL: What Rural Women Ask Us Every Wednesday',
      author: 'PARWL-Pakistan Team',
      date: '4 June 2025',
      image: 'images/site/prog-ai.jpg',
      imageAlt: 'PARWL-Pakistan Wednesday webinar',
      body: [
        'Every Wednesday, PODA\'s PARWL-Pakistan webinar series puts rural women and civic leaders in the same virtual room as policy experts, government officials and researchers. After more than 200 episodes, a few questions keep coming back.',
        '"How do I register to vote if I don\'t have my CNIC yet?" is still the single most common question, which is exactly why legal identity work remains a flagship focus area rather than a side project. Close behind: questions about digital safety, as more women in the network use smartphones for the first time, and questions about climate — particularly from rural women farmers watching weather patterns shift under them.',
        'The format has evolved with the questions. Early episodes leaned toward civic education lectures; recent ones look more like structured office hours, with government officials fielding questions live. It\'s a small format change, but it reflects what the network has taught us: rural women don\'t need to be told what matters to them — they need a direct line to the people who can act on it.'
      ]
    }
  };

  var slug = new URLSearchParams(window.location.search).get('post') || 'reflections-18th-annual-conference';
  var post = POSTS[slug] || POSTS['reflections-18th-annual-conference'];

    '<span><svg class="icon"><use href="#i-person"/></svg>' + post.author + '</span>' +
    '<span><svg class="icon"><use href="#i-calendar"/></svg>' + post.date + '</span>';
  document.title = post.title + ' — PODA Pakistan';

  document.getElementById('post-body').innerHTML =
    '<div class="reveal" style="margin-bottom:32px;"><div class="post-media"><img src="' + post.image + '" alt="' + post.imageAlt + '"></div></div>' +
    post.body.map(function(p){ return '<p class="reveal" style="margin-bottom:20px;font-size:15.5px;line-height:1.7;color:#463a4d;">' + p + '</p>'; }).join('');
})();
